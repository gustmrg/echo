services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=echo;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Storage__Endpoint: "http://minio:9000"
      Storage__AccessKey: "${MINIO_ROOT_USER}"
      Storage__SecretKey: "${MINIO_ROOT_PASSWORD}"
      Storage__BucketName: "echo-files"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - echo-network

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: echo
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d echo"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - echo-network

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - echo-network

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/echo-files
      "
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    networks:
      - echo-network

volumes:
  pgdata:
  miniodata:

networks:
  echo-network:
    driver: bridge
