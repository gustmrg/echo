services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Data Source=/data/echo.db"
      AWS__S3__BucketName: "echo-files"
      AWS__S3__Region: "us-east-1"
      AWS__S3__ServiceUrl: "http://minio:9000"
      AWS__S3__AccessKey: "${MINIO_ROOT_USER}"
      AWS__S3__SecretKey: "${MINIO_ROOT_PASSWORD}"
      AWS__S3__ForcePathStyle: "true"
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - appdata:/data
    networks:
      - echo-network

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    environment:
      DB_PATH: "/data/echo.db"
      S3_BUCKET: "echo-files"
      S3_REGION: "us-east-1"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      S3_FORCE_PATH_STYLE: "true"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - appdata:/data
    networks:
      - echo-network

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - echo-network

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/echo-files
      "
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    networks:
      - echo-network

volumes:
  appdata:
  miniodata:

networks:
  echo-network:
    driver: bridge
